<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能机器人控制面板 - WebSocket</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.connected {
            background: #4caf50;
        }
        
        .status-indicator.disconnected {
            background: #f44336;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .panel h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #e53935 100%);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
        }
        
        .custom-command {
            margin-top: 20px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-group textarea {
            font-family: 'Courier New', monospace;
            min-height: 100px;
            resize: vertical;
        }
        
        .response-panel {
            margin-top: 20px;
        }
        
        .response-box {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .response-item {
            padding: 10px;
            margin-bottom: 10px;
            background: white;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        
        .response-item.error {
            border-left-color: #f44336;
        }
        
        .response-item.success {
            border-left-color: #4caf50;
        }
        
        .timestamp {
            color: #888;
            font-size: 11px;
            margin-bottom: 5px;
        }
        
        .ws-config {
            margin-bottom: 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 智能机器人控制面板</h1>
            <div class="connection-status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">未连接</span>
                <input type="text" id="wsUrl" value="ws://localhost:8766" placeholder="WebSocket URL" style="margin-left: 20px; padding: 8px; border-radius: 5px; border: 1px solid #ddd; width: 250px;">
                <button class="btn btn-primary" onclick="connectWebSocket()">连接</button>
                <button class="btn btn-danger" onclick="disconnectWebSocket()">断开</button>
            </div>
        </div>
        
        <div class="main-content">
            <div class="panel">
                <h2>控制命令</h2>
                
                <div class="button-group">
                    <button class="btn btn-primary" onclick="sendCommand('go_to_door', {})">🚪 去门口</button>
                    <button class="btn btn-primary" onclick="sendCommand('back_to_last_position', {})">🔙 返回起点</button>
                    <button class="btn btn-success" onclick="sendCommand('get_move_mode', {})">📊 获取运动模式</button>
                    <button class="btn btn-success" onclick="sendCommand('get_robot_rise_state', {})">📏 获取升降状态</button>
                    <button class="btn btn-success" onclick="sendCommand('get_medicine_box_state', {})">💊 获取药箱状态</button>
                    <button class="btn btn-warning" onclick="sendCommand('stop_move', {})">⏹️ 停止移动</button>
                    <button class="btn btn-danger" onclick="sendCommand('stop_navigate', {})">🛑 停止导航</button>
                    <button class="btn btn-danger" onclick="sendCommand('stop_follow', {})">🚫 停止跟随</button>
                </div>
                
                <div class="button-group">
                    <button class="btn btn-success" onclick="sendCommand('set_rgb', {switch: true, color: 'green', mode: 0})">💡 开启RGB灯(绿)</button>
                    <button class="btn btn-danger" onclick="sendCommand('set_rgb', {switch: false})">💡 关闭RGB灯</button>
                    <button class="btn btn-success" onclick="sendCommand('set_robot_rise_jqr', {rise: true})">⬆️ 升起机身</button>
                    <button class="btn btn-danger" onclick="sendCommand('set_robot_rise_jqr', {rise: false})">⬇️ 降下机身</button>
                </div>
                
                <div class="custom-command">
                    <h3 style="margin-bottom: 15px; color: #555;">自定义命令</h3>
                    <div class="input-group">
                        <label>任务类型 (type)</label>
                        <input type="text" id="customType" placeholder="例如: go_to_door">
                    </div>
                    <div class="input-group">
                        <label>参数 (params) - JSON格式</label>
                        <textarea id="customParams" placeholder='例如: {"obj_name": "遥控器"}'>{}</textarea>
                    </div>
                    <button class="btn btn-primary" style="width: 100%;" onclick="sendCustomCommand()">发送自定义命令</button>
                </div>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalMessages">0</div>
                        <div class="stat-label">发送消息数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="successCount">0</div>
                        <div class="stat-label">成功响应</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="errorCount">0</div>
                        <div class="stat-label">错误响应</div>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <h2>响应日志</h2>
                <div class="response-box" id="responseLog">
                    <div style="text-align: center; color: #999; padding: 20px;">
                        等待响应...
                    </div>
                </div>
                <button class="btn btn-warning" style="width: 100%; margin-top: 15px;" onclick="clearLog()">清空日志</button>
            </div>
        </div>
    </div>
    
    <script>
        let websocket = null;
        let totalMessages = 0;
        let successCount = 0;
        let errorCount = 0;
        
        function connectWebSocket() {
            const wsUrl = document.getElementById('wsUrl').value;
            
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                addLog('已经连接，无需重复连接', 'warning');
                return;
            }
            
            try {
                websocket = new WebSocket(wsUrl);
                
                websocket.onopen = function() {
                    updateConnectionStatus(true);
                    addLog('✓ WebSocket连接成功', 'success');
                };
                
                websocket.onmessage = function(event) {
                    try {
                        const response = JSON.parse(event.data);
                        handleResponse(response);
                    } catch (e) {
                        addLog('JSON解析失败: ' + event.data, 'error');
                    }
                };
                
                websocket.onerror = function(error) {
                    addLog('WebSocket错误: ' + error, 'error');
                };
                
                websocket.onclose = function() {
                    updateConnectionStatus(false);
                    addLog('WebSocket连接已关闭', 'error');
                };
                
            } catch (e) {
                addLog('连接失败: ' + e.message, 'error');
            }
        }
        
        function disconnectWebSocket() {
            if (websocket) {
                websocket.close();
                websocket = null;
                updateConnectionStatus(false);
            }
        }
        
        function updateConnectionStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            
            if (connected) {
                indicator.className = 'status-indicator connected';
                text.textContent = '已连接';
            } else {
                indicator.className = 'status-indicator disconnected';
                text.textContent = '未连接';
            }
        }
        
        function sendCommand(type, params = {}) {
            if (!websocket || websocket.readyState !== WebSocket.OPEN) {
                addLog('WebSocket未连接，请先连接', 'error');
                return;
            }
            
            const command = {
                type: type,
                params: params
            };
            
            const message = JSON.stringify(command);
            websocket.send(message);
            
            totalMessages++;
            updateStats();
            
            addLog('→ 发送: ' + type, 'info');
        }
        
        function sendCustomCommand() {
            const type = document.getElementById('customType').value.trim();
            const paramsStr = document.getElementById('customParams').value.trim();
            
            if (!type) {
                addLog('请输入任务类型', 'error');
                return;
            }
            
            let params = {};
            try {
                if (paramsStr) {
                    params = JSON.parse(paramsStr);
                }
            } catch (e) {
                addLog('参数JSON格式错误: ' + e.message, 'error');
                return;
            }
            
            sendCommand(type, params);
        }
        
        function handleResponse(response) {
            const success = response.success;
            const type = response.type || 'unknown';
            const errorMsg = response.error_msg || '';
            
            if (success) {
                successCount++;
                addLog('✓ 成功 [' + type + ']', 'success', response);
            } else {
                errorCount++;
                addLog('✗ 失败 [' + type + ']: ' + errorMsg, 'error', response);
            }
            
            updateStats();
        }
        
        function addLog(message, type = 'info', data = null) {
            const logBox = document.getElementById('responseLog');
            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            
            const item = document.createElement('div');
            item.className = 'response-item ' + type;
            
            let content = '<div class="timestamp">' + timestamp + '</div>';
            content += '<div>' + message + '</div>';
            
            if (data) {
                content += '<div style="margin-top: 8px; color: #666;">' + JSON.stringify(data, null, 2) + '</div>';
            }
            
            item.innerHTML = content;
            
            // 插入到最前面
            if (logBox.firstChild && logBox.firstChild.className !== 'response-item') {
                logBox.innerHTML = '';
            }
            logBox.insertBefore(item, logBox.firstChild);
            
            // 限制日志数量
            while (logBox.children.length > 50) {
                logBox.removeChild(logBox.lastChild);
            }
        }
        
        function updateStats() {
            document.getElementById('totalMessages').textContent = totalMessages;
            document.getElementById('successCount').textContent = successCount;
            document.getElementById('errorCount').textContent = errorCount;
        }
        
        function clearLog() {
            document.getElementById('responseLog').innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">日志已清空</div>';
        }
        
        // 页面加载时自动连接
        window.onload = function() {
            addLog('控制面板已就绪，请点击"连接"按钮', 'info');
        };
        
        // 页面关闭时断开连接
        window.onbeforeunload = function() {
            if (websocket) {
                websocket.close();
            }
        };
    </script>
</body>
</html>
