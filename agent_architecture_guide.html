<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jrobot Agent 交互式运行骨架</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --text: #172033;
      --muted: #5c667a;
      --line: #d7dce8;
      --panel: #ffffff;
      --panel-2: #eef6f5;
      --blue: #2563eb;
      --green: #0f766e;
      --red: #b42318;
      --yellow: #a16207;
      --violet: #6d28d9;
      --cyan: #0369a1;
      --orange: #c2410c;
      --shadow: 0 12px 32px rgba(21, 31, 54, 0.10);
      --radius: 8px;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.86), rgba(247,248,251,0.94)),
        repeating-linear-gradient(90deg, rgba(37,99,235,0.05) 0 1px, transparent 1px 72px),
        repeating-linear-gradient(0deg, rgba(15,118,110,0.04) 0 1px, transparent 1px 72px);
    }

    header {
      min-height: 112px;
      padding: 22px 28px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 1120px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(620px, 1.2fr) minmax(390px, 0.8fr);
      gap: 18px;
      padding: 18px;
      max-width: 1580px;
      margin: 0 auto;
    }

    .left,
    .right {
      min-width: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .zoom-controls {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding-left: 4px;
    }

    .tool-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #25324a;
      height: 36px;
      padding: 0 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: 140ms ease;
    }

    .tool-btn:hover {
      background: #f0f7ff;
      border-color: #9bb8f5;
      color: var(--blue);
    }

    .zoom-readout {
      min-width: 54px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .tab {
      border: 1px solid var(--line);
      background: #fff;
      color: #25324a;
      height: 36px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 140ms ease;
    }

    .tab:hover,
    .tab.active {
      background: #183153;
      border-color: #183153;
      color: #fff;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 12px;
      margin-left: auto;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
    }

    .blue { background: var(--blue); }
    .green { background: var(--green); }
    .violet { background: var(--violet); }
    .cyan { background: var(--cyan); }
    .yellow { background: var(--yellow); }
    .red { background: var(--red); }
    .orange { background: var(--orange); }

    .map {
      position: relative;
      height: 700px;
      min-height: 560px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: grab;
      touch-action: none;
      user-select: none;
    }

    .map.dragging {
      cursor: grabbing;
    }

    .map-inner {
      position: relative;
      width: 1320px;
      height: 780px;
      margin: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    svg.edges {
      position: absolute;
      inset: 0;
      width: 1320px;
      height: 780px;
      pointer-events: none;
    }

    .edge {
      stroke: #8793aa;
      stroke-width: 2.3;
      fill: none;
      marker-end: url(#arrow);
      opacity: 0.58;
    }

    .edge.active {
      stroke: var(--blue);
      stroke-width: 3.2;
      opacity: 1;
    }

    .node {
      position: absolute;
      width: 176px;
      min-height: 76px;
      border: 1px solid var(--line);
      border-left: 6px solid var(--blue);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      text-align: left;
      padding: 10px 10px 9px;
      cursor: grab;
      box-shadow: 0 8px 22px rgba(21,31,54,0.08);
      transition: box-shadow 140ms ease, border-color 140ms ease, opacity 140ms ease;
      user-select: none;
      touch-action: none;
    }

    .node:hover,
    .node.active {
      box-shadow: 0 14px 30px rgba(21,31,54,0.16);
      border-color: #91a7ff;
    }

    .node.dragging {
      cursor: grabbing;
      box-shadow: 0 18px 34px rgba(21,31,54,0.22);
      z-index: 10;
    }

    .node.thread { border-left-color: var(--green); }
    .node.loop { border-left-color: var(--violet); }
    .node.io { border-left-color: var(--cyan); }
    .node.task { border-left-color: var(--yellow); }
    .node.stop { border-left-color: var(--red); }
    .node.nlp { border-left-color: var(--orange); }

    .node .kicker {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node .title {
      font-weight: 700;
      font-size: 14px;
      line-height: 1.3;
    }

    .node .mini {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .detail {
      position: sticky;
      top: 136px;
      max-height: calc(100vh - 154px);
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .detail-head {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, #f4f7fb);
    }

    .detail-head h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .badge {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
    }

    .detail-body {
      padding: 16px 18px 20px;
    }

    .section {
      padding: 14px 0;
      border-bottom: 1px solid #edf0f6;
    }

    .section:last-child {
      border-bottom: 0;
    }

    .section h3 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.35;
    }

    .section p {
      margin: 0 0 10px;
      color: #2e3b54;
      line-height: 1.8;
      font-size: 14px;
    }

    .section ul {
      margin: 8px 0 0;
      padding-left: 20px;
      color: #2e3b54;
      line-height: 1.75;
      font-size: 14px;
    }

    .code-ref {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }

    .code-ref a,
    .code-ref span {
      display: block;
      color: var(--blue);
      text-decoration: none;
      font-size: 13px;
      line-height: 1.45;
      word-break: break-all;
    }

    pre {
      margin: 8px 0 0;
      padding: 12px;
      overflow: auto;
      border: 1px solid #d9e1ef;
      border-radius: 6px;
      background: #0f172a;
      color: #e6edf7;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .example-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 10px;
    }

    .example-btn {
      border: 1px solid #c9d3e5;
      background: #fff;
      height: 32px;
      padding: 0 10px;
      border-radius: 6px;
      cursor: pointer;
      color: #25324a;
    }

    .example-btn.active {
      border-color: var(--green);
      background: var(--panel-2);
      color: var(--green);
      font-weight: 700;
    }

    .flow-table {
      margin-top: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid #edf0f6;
      padding: 11px 12px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.55;
      word-break: break-word;
    }

    th {
      background: #f4f7fb;
      color: #2d3950;
      font-weight: 700;
    }

    tr.clickable {
      cursor: pointer;
    }

    tr.clickable:hover,
    tr.clickable.active {
      background: #f0f7ff;
    }

    .phase {
      font-weight: 700;
      color: #172033;
    }

    .mobile-note {
      display: none;
      margin: 0 18px 12px;
      padding: 10px 12px;
      background: #fff8e6;
      border: 1px solid #f1d38b;
      border-radius: var(--radius);
      color: #60410a;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 1080px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .detail {
        position: static;
        max-height: none;
      }
      .legend {
        margin-left: 0;
      }
    }

    @media (max-width: 720px) {
      header {
        padding: 18px 16px 14px;
      }
      h1 {
        font-size: 22px;
      }
      .layout {
        padding: 12px;
      }
      .map {
        min-height: 620px;
      }
      .map-inner {
        transform-origin: top left;
      }
      .mobile-note {
        display: block;
      }
      th:nth-child(3),
      td:nth-child(3) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Jrobot Agent 交互式运行骨架</h1>
    <p class="subtitle">从进程、线程、event loop、WebSocket、USB、ROS2、本地模型到任务分发，把 agent 的运行结构放在同一张图里。每个节点都对应源码中的真实位置、职责、数据输入输出和初学者例子。</p>
  </header>

  <p class="mobile-note">横向内容较多，图谱区域可以左右滑动查看。</p>

  <main class="layout">
    <section class="left">
      <div class="toolbar">
        <button class="tab active" data-view="all">总览</button>
        <button class="tab" data-view="websocket">WebSocket 请求链路</button>
        <button class="tab" data-view="natural">自然语言链路</button>
        <button class="tab" data-view="ros">ROS2 状态链路</button>
        <button class="tab" data-view="model">本地模型链路</button>
        <div class="zoom-controls" aria-label="图谱视图控制">
          <button class="tool-btn" id="zoomOut" type="button">缩小</button>
          <span class="zoom-readout" id="zoomReadout">100%</span>
          <button class="tool-btn" id="zoomIn" type="button">放大</button>
          <button class="tool-btn" id="resetView" type="button">重置视图</button>
          <button class="tool-btn" id="resetLayout" type="button">重置节点</button>
        </div>
        <div class="legend">
          <span><i class="dot blue"></i>主生命周期</span>
          <span><i class="dot green"></i>线程</span>
          <span><i class="dot violet"></i>event loop</span>
          <span><i class="dot cyan"></i>IO 通道</span>
          <span><i class="dot yellow"></i>任务调度</span>
          <span><i class="dot red"></i>停止动作</span>
          <span><i class="dot orange"></i>自然语言</span>
        </div>
      </div>

      <div class="map" id="map">
        <div class="map-inner" id="mapInner">
          <svg class="edges" id="edgesSvg" viewBox="0 0 1320 780" aria-hidden="true">
            <defs>
              <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
                <path d="M0,0 L9,4.5 L0,9 Z" fill="#8793aa"></path>
              </marker>
            </defs>
          </svg>

          <button class="node blue" id="node-main" data-id="main" style="left:40px;top:54px">
            <div class="kicker">主线程</div>
            <div class="title">asyncio.run(main)</div>
            <div class="mini">创建主 event loop</div>
          </button>

          <button class="node blue" id="node-agent" data-id="agent" style="left:310px;top:54px">
            <div class="kicker">对象组装</div>
            <div class="title">SmartRobotAgent()</div>
            <div class="mini">组装 ROS2 / USB / WebSocket</div>
          </button>

          <button class="node blue" id="node-initialize" data-id="initialize" style="left:580px;top:54px">
            <div class="kicker">正式启动</div>
            <div class="title">await initialize()</div>
            <div class="mini">启动监控与服务</div>
          </button>

          <button class="node thread" id="node-ros-thread" data-id="ros-thread" style="left:850px;top:190px">
            <div class="kicker">ROS2 线程</div>
            <div class="title">ROS2 spin 线程</div>
            <div class="mini">处理订阅和回调</div>
          </button>

          <button class="node io" id="node-ros-state" data-id="ros-state" style="left:580px;top:190px">
            <div class="kicker">ROS2 状态</div>
            <div class="title">电池 / 位置 / 电机结果</div>
            <div class="mini">状态持续更新</div>
          </button>

          <button class="node io" id="node-client" data-id="client" style="left:40px;top:326px">
            <div class="kicker">客户端</div>
            <div class="title">test_stop_ws.py</div>
            <div class="mini">发送 JSON 字符串</div>
          </button>

          <button class="node thread" id="node-ws-thread" data-id="ws-thread" style="left:310px;top:326px">
            <div class="kicker">WebSocket 线程</div>
            <div class="title">WebSocketControlServer</div>
            <div class="mini">独立线程监听端口</div>
          </button>

          <button class="node loop" id="node-ws-loop" data-id="ws-loop" style="left:580px;top:326px">
            <div class="kicker">WebSocket event loop</div>
            <div class="title">_handle_client / _handle_message</div>
            <div class="mini">等待连接与消息</div>
          </button>

          <button class="node task" id="node-execute" data-id="execute" style="left:850px;top:326px">
            <div class="kicker">统一入口</div>
            <div class="title">agent.execute_task()</div>
            <div class="mini">抽取 type / params，加锁</div>
          </button>

          <button class="node task" id="node-dispatch" data-id="dispatch" style="left:1090px;top:326px">
            <div class="kicker">任务分发</div>
            <div class="title">_execute_task_by_type()</div>
            <div class="mini">按 type 找具体函数</div>
          </button>

          <button class="node stop" id="node-stop" data-id="stop-move" style="left:1090px;top:532px">
            <div class="kicker">具体动作</div>
            <div class="title">stop_move()</div>
            <div class="mini">停止模型导航并发布 /cmd_vel=0</div>
          </button>

          <button class="node nlp" id="node-natural-input" data-id="natural-input" style="left:40px;top:532px">
            <div class="kicker">自然语言入口</div>
            <div class="title">“停止移动”</div>
            <div class="mini">中文句子，不是标准 task</div>
          </button>

          <button class="node nlp" id="node-agent-message" data-id="agent-message" style="left:310px;top:532px">
            <div class="kicker">Agent 消息入口</div>
            <div class="title">handle_client_message()</div>
            <div class="mini">识别字符串或无 type 字典</div>
          </button>

          <button class="node loop" id="node-local-model" data-id="local-model" style="left:850px;top:532px">
            <div class="kicker">本地模型连接</div>
            <div class="title">send_to_local_model()</div>
            <div class="mini">线程本地 WebSocket</div>
          </button>

          <button class="node io" id="node-model-server" data-id="model-server" style="left:580px;top:532px">
            <div class="kicker">外部模型服务</div>
            <div class="title">LOCAL_MODEL_URI</div>
            <div class="mini">接收任务，返回中间/最终结果</div>
          </button>

          <button class="node nlp" id="node-llm-analysis" data-id="llm-analysis" style="left:580px;top:638px">
            <div class="kicker">LLM 分析</div>
            <div class="title">analyze_with_llm()</div>
            <div class="mini">让模型返回 JSON task</div>
          </button>

          <button class="node nlp" id="node-llm-task" data-id="llm-task" style="left:850px;top:638px">
            <div class="kicker">结构化结果</div>
            <div class="title">LLM 输出 task</div>
            <div class="mini">{type, params}</div>
          </button>

        </div>
      </div>

      <div class="flow-table">
        <table>
          <thead>
            <tr>
              <th style="width: 18%">阶段</th>
              <th style="width: 34%">节点</th>
              <th>发生了什么</th>
            </tr>
          </thead>
          <tbody id="flowRows"></tbody>
        </table>
      </div>
    </section>

    <aside class="right">
      <div class="detail" id="detail">
        <div class="detail-head">
          <h2 id="detailTitle"></h2>
          <p class="subtitle" id="detailSubtitle"></p>
          <div class="badge-row" id="detailBadges"></div>
        </div>
        <div class="detail-body" id="detailBody"></div>
      </div>
    </aside>
  </main>

  <script>
    const nodes = {
      "main": {
        title: "asyncio.run(main)",
        subtitle: "整个 agent 的主入口。它创建主 event loop，然后运行 main()。",
        badges: ["主线程", "主 event loop", "生命周期入口"],
        refs: ["smart_robot_agent.py:6417", "smart_robot_agent.py:6377"],
        concept: "进程是正在运行的程序；线程是进程里的执行路线；event loop 是一个线程里的异步任务调度器。这里的 asyncio.run(main) 会创建主线程里的 event loop，并让 main() 在里面运行。",
        responsibilities: [
          "创建主 asyncio event loop。",
          "运行 main()，让 agent 按顺序完成初始化。",
          "在程序结束时关闭主 event loop。"
        ],
        flow: [
          "Python 执行 smart_robot_agent.py。",
          "进入 if __name__ == '__main__'。",
          "调用 asyncio.run(main())。",
          "asyncio 创建主 event loop，开始运行 main()。"
        ],
        examples: [
          {
            name: "最小 async 入口",
            code: "import asyncio\n\nasync def main():\n    print('agent start')\n    await asyncio.sleep(1)\n    print('agent alive')\n\nasyncio.run(main())",
            explain: "asyncio.run() 会创建 event loop。await asyncio.sleep(1) 不会卡死整个事件循环，而是让 loop 可以去处理别的异步任务。"
          },
          {
            name: "项目里的位置",
            code: "if __name__ == \"__main__\":\n    try:\n        asyncio.run(main())\n    except KeyboardInterrupt:\n        logger.info(\"程序被用户中断\")",
            explain: "这就是项目启动主入口。所有后面的 agent 初始化、WebSocket 启动、后台任务都从这里开始。"
          }
        ]
      },
      "agent": {
        title: "SmartRobotAgent()",
        subtitle: "agent 的对象组装阶段。此时只是把核心零件创建好，还没有全部启动。",
        badges: ["对象组装", "ROS2Interface", "USBCoordinateManager", "WebSocketControlServer"],
        refs: ["smart_robot_agent.py:4662", "smart_robot_agent.py:4665", "smart_robot_agent.py:4714"],
        concept: "__init__ 是构造函数。它更像把零件装到机器人控制箱里：ROS2 接口、USB 管理器、WebSocket 服务、任务白名单、记忆系统。",
        responsibilities: [
          "创建 ROS2Interface，用于机器人 ROS2 能力。",
          "创建 USBCoordinateManager，用于串口收发与转发。",
          "创建 WebSocketControlServer，并把 agent 自己传进去。",
          "创建任务锁、连接锁、线程本地存储和本地模型连接状态。",
          "定义 known_task_types，也就是 agent 允许执行的任务白名单。"
        ],
        flow: [
          "main() 执行 agent = SmartRobotAgent()。",
          "SmartRobotAgent.__init__ 创建各个组件。",
          "WebSocketControlServer(agent=self) 让 WebSocket 服务未来能反向调用 agent.execute_task()。",

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function readNodePosition(el) {
      return {
        x: parseFloat(el.style.left || "0"),
        y: parseFloat(el.style.top || "0")
      };
    }

    function setNodePosition(el, x, y) {
      const maxX = canvas.width - el.offsetWidth - 16;
      const maxY = canvas.height - el.offsetHeight - 16;
      el.style.left = `${clamp(x, 12, maxX)}px`;
      el.style.top = `${clamp(y, 12, maxY)}px`;
    }

    function initDefaultPositions() {
      nodeEls.forEach(el => {
        defaultPositions[el.dataset.id] = readNodePosition(el);
      });
    }

    function applyViewport() {
      mapInner.style.transform = `matrix(${viewport.scale}, 0, 0, ${viewport.scale}, ${viewport.x}, ${viewport.y})`;
      zoomReadout.textContent = `${Math.round(viewport.scale * 100)}%`;
    }

    function screenToWorld(event) {
      const rect = map.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left - viewport.x) / viewport.scale,
        y: (event.clientY - rect.top - viewport.y) / viewport.scale
      };
    }

    function zoomAt(clientX, clientY, nextScale) {
      const rect = map.getBoundingClientRect();
      const oldScale = viewport.scale;
      nextScale = clamp(nextScale, 0.48, 1.9);
      const worldX = (clientX - rect.left - viewport.x) / oldScale;
      const worldY = (clientY - rect.top - viewport.y) / oldScale;
      viewport.scale = nextScale;
      viewport.x = clientX - rect.left - worldX * nextScale;
      viewport.y = clientY - rect.top - worldY * nextScale;
      applyViewport();
    }

    function resetView() {
      viewport.scale = 0.86;
      viewport.x = 24;
      viewport.y = 24;
      applyViewport();
    }

    function resetLayout() {
      nodeEls.forEach(el => {
        const pos = defaultPositions[el.dataset.id];
        if (pos) setNodePosition(el, pos.x, pos.y);
      });
      updateEdges();
      selectNode(activeNodeId);
    }

    function nodeBox(id) {
      const el = document.querySelector(`.node[data-id="${id}"]`);
      if (!el) return null;
      const pos = readNodePosition(el);
      return {
        x: pos.x,
        y: pos.y,
        w: el.offsetWidth,
        h: el.offsetHeight,
        cx: pos.x + el.offsetWidth / 2,
        cy: pos.y + el.offsetHeight / 2
      };
    }

    function anchorPair(from, to) {
      const dx = to.cx - from.cx;
      const dy = to.cy - from.cy;
      if (Math.abs(dx) >= Math.abs(dy)) {
        return {
          start: { x: dx >= 0 ? from.x + from.w : from.x, y: from.cy },
          end: { x: dx >= 0 ? to.x : to.x + to.w, y: to.cy },
          axis: "x"
        };
      }
      return {
        start: { x: from.cx, y: dy >= 0 ? from.y + from.h : from.y },
        end: { x: to.cx, y: dy >= 0 ? to.y : to.y + to.h },
        axis: "y"
      };
    }

    function edgePath(fromId, toId) {
      const from = nodeBox(fromId);
      const to = nodeBox(toId);
      if (!from || !to) return "";
      const pair = anchorPair(from, to);
      const sx = pair.start.x;
      const sy = pair.start.y;
      const ex = pair.end.x;
      const ey = pair.end.y;
      if (pair.axis === "x") {
        const bend = Math.max(70, Math.abs(ex - sx) * 0.42);
        const sign = ex >= sx ? 1 : -1;
        return `M${sx} ${sy} C${sx + bend * sign} ${sy}, ${ex - bend * sign} ${ey}, ${ex} ${ey}`;
      }
      const bend = Math.max(60, Math.abs(ey - sy) * 0.42);
      const sign = ey >= sy ? 1 : -1;
      return `M${sx} ${sy} C${sx} ${sy + bend * sign}, ${ex} ${ey - bend * sign}, ${ex} ${ey}`;
    }

    function initEdges() {
      edgesSvg.querySelectorAll(".edge").forEach(edge => edge.remove());
      edgeDefs.forEach(def => {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.classList.add("edge");
        path.dataset.edge = def.id;
        path.dataset.from = def.from;
        path.dataset.to = def.to;
        edgesSvg.appendChild(path);
      });
      updateEdges();
    }

    function updateEdges() {
      edgesSvg.querySelectorAll(".edge").forEach(path => {
        path.setAttribute("d", edgePath(path.dataset.from, path.dataset.to));
      });
    }

    function selectNode(id) {
      activeNodeId = id;
      nodeEls.forEach(el => el.classList.toggle("active", el.dataset.id === id));
      document.querySelectorAll("[data-row]").forEach(el => el.classList.toggle("active", el.dataset.row === id));
      document.querySelectorAll(".edge").forEach(el => el.classList.remove("active"));
      (relatedEdges[id] || []).forEach(edgeId => {
        const edge = document.querySelector(`[data-edge="${edgeId}"]`);
        if (edge) edge.classList.add("active");
      });
      renderDetail(id);
    }

    function applyView(view) {
      currentView = view;
      const visible = new Set(views[view] || views.all);
      nodeEls.forEach(el => {
        const show = view === "all" || visible.has(el.dataset.id);
        el.style.opacity = show ? "1" : "0.2";
        el.style.pointerEvents = show ? "auto" : "none";
      });
      document.querySelectorAll("[data-row]").forEach(el => {
        const show = view === "all" || visible.has(el.dataset.row);
        el.style.display = show ? "" : "none";
      });
      edgesSvg.querySelectorAll(".edge").forEach(edge => {
        const show = view === "all" || (visible.has(edge.dataset.from) && visible.has(edge.dataset.to));
        edge.style.display = show ? "" : "none";
      });
      document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.view === view));
      const first = view === "all" ? "main" : (views[view] || ["main"])[0];
      selectNode(first);
    }

    function beginNodeDrag(event, el) {
      if (event.button !== 0) return;
      event.preventDefault();
      event.stopPropagation();
      const world = screenToWorld(event);
      const pos = readNodePosition(el);
      dragState = {
        type: "node",
        id: el.dataset.id,
        el,
        startClientX: event.clientX,
        startClientY: event.clientY,
        offsetX: world.x - pos.x,
        offsetY: world.y - pos.y,
        moved: false
      };
      el.classList.add("dragging");
      el.setPointerCapture(event.pointerId);
      selectNode(el.dataset.id);
    }

    function beginCanvasPan(event) {
      if (event.button !== 0) return;
      const targetIsCanvas = event.target === map || event.target === mapInner || event.target === edgesSvg || event.target.closest("svg.edges");
      if (!targetIsCanvas) return;
      event.preventDefault();
      dragState = {
        type: "pan",
        startClientX: event.clientX,
        startClientY: event.clientY,
        startX: viewport.x,
        startY: viewport.y,
        moved: false
      };
      map.classList.add("dragging");
      map.setPointerCapture(event.pointerId);
    }

    function handlePointerMove(event) {
      if (!dragState) return;
      const dx = event.clientX - dragState.startClientX;
      const dy = event.clientY - dragState.startClientY;
      if (Math.abs(dx) + Math.abs(dy) > 3) dragState.moved = true;
      if (dragState.type === "node") {
        const world = screenToWorld(event);
        setNodePosition(dragState.el, world.x - dragState.offsetX, world.y - dragState.offsetY);
        updateEdges();
      } else if (dragState.type === "pan") {
        viewport.x = dragState.startX + dx;
        viewport.y = dragState.startY + dy;
        applyViewport();
      }
    }

    function endDrag(event) {
      if (!dragState) return;
      if (dragState.type === "node") {
        dragState.el.classList.remove("dragging");
        if (dragState.el.hasPointerCapture(event.pointerId)) {
          dragState.el.releasePointerCapture(event.pointerId);
        }
      } else {
        map.classList.remove("dragging");
        if (map.hasPointerCapture(event.pointerId)) {
          map.releasePointerCapture(event.pointerId);
        }
      }
      dragState = null;
    }

    nodeEls.forEach(el => {
      el.addEventListener("pointerdown", event => beginNodeDrag(event, el));
    });
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => applyView(tab.dataset.view));
    });
    map.addEventListener("pointerdown", beginCanvasPan);
    map.addEventListener("pointermove", handlePointerMove);
    map.addEventListener("pointerup", endDrag);
    map.addEventListener("pointercancel", endDrag);
    map.addEventListener("wheel", event => {
      event.preventDefault();
      const factor = event.deltaY < 0 ? 1.08 : 0.92;
      zoomAt(event.clientX, event.clientY, viewport.scale * factor);
    }, { passive: false });

    document.getElementById("zoomIn").addEventListener("click", () => {
      const rect = map.getBoundingClientRect();
      zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, viewport.scale * 1.12);
    });
    document.getElementById("zoomOut").addEventListener("click", () => {
      const rect = map.getBoundingClientRect();
      zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, viewport.scale * 0.88);
    });
    document.getElementById("resetView").addEventListener("click", resetView);
    document.getElementById("resetLayout").addEventListener("click", resetLayout);

    initDefaultPositions();
    initEdges();
    resetView();
    renderRows();
    selectNode("main");
  </script>
</body>
</html>
