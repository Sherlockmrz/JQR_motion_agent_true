<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>组合电机控制 · 场景测试面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #0f1923; color: #e0e6ed; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a2a3a, #0d1b2a); padding: 16px 24px; border-bottom: 1px solid #2a3a4a; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; font-weight: 600; }
.conn-bar { display: flex; align-items: center; gap: 10px; }
.conn-bar input { background: #1a2a3a; border: 1px solid #3a4a5a; color: #e0e6ed; padding: 6px 12px; border-radius: 6px; width: 220px; font-size: 13px; }
.conn-bar button { padding: 6px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; }
.btn-connect { background: #2ecc71; color: #fff; }
.btn-connect:hover { background: #27ae60; }
.btn-disconnect { background: #e74c3c; color: #fff; }
.btn-disconnect:hover { background: #c0392b; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.status-dot.off { background: #e74c3c; }
.status-dot.on { background: #2ecc71; }
.main { display: flex; height: calc(100vh - 56px); }
.sidebar { width: 380px; border-right: 1px solid #2a3a4a; overflow-y: auto; padding: 12px; flex-shrink: 0; }
.log-panel { flex: 1; display: flex; flex-direction: column; }
.log-header { padding: 10px 16px; border-bottom: 1px solid #2a3a4a; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; }
.log-body { flex: 1; overflow-y: auto; padding: 8px 16px; font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 12px; line-height: 1.6; }
.log-entry { margin: 2px 0; }
.log-entry.send { color: #3498db; }
.log-entry.recv { color: #2ecc71; }
.log-entry.error { color: #e74c3c; }
.log-entry.info { color: #95a5a6; }
.log-entry .ts { color: #5a6a7a; margin-right: 6px; }
.category-label { font-size: 11px; color: #7a8a9a; text-transform: uppercase; letter-spacing: 1px; margin: 14px 0 6px; padding-left: 4px; }
.scenario-card { background: #1a2a3a; border: 1px solid #2a3a4a; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.scenario-card:hover { border-color: #3a8bdb; background: #1e3048; }
.scenario-card.running { border-color: #f39c12; }
.scenario-card.pass { border-color: #2ecc71; }
.scenario-card.fail { border-color: #e74c3c; }
.scenario-card .title { font-size: 13px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.scenario-card .desc { font-size: 11px; color: #7a8a9a; line-height: 1.5; white-space: pre-line; }
.scenario-card .badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
.badge-pass { background: #2ecc71; color: #fff; }
.badge-fail { background: #e74c3c; color: #fff; }
.badge-running { background: #f39c12; color: #fff; }
/* scenario card details */
.actions { padding: 12px; border-top: 1px solid #2a3a4a; display: flex; gap: 8px; }
.actions button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600; }
.btn-run-all { background: #3498db; color: #fff; }
.btn-run-all:hover { background: #2980b9; }
.btn-run-all:disabled { background: #2a3a4a; color: #5a6a7a; cursor: not-allowed; }
.btn-clear { background: #2a3a4a; color: #95a5a6; }
.btn-clear:hover { background: #3a4a5a; }
.stats-bar { padding: 8px 16px; border-top: 1px solid #2a3a4a; font-size: 12px; color: #7a8a9a; display: flex; gap: 16px; }
.stats-bar .pass { color: #2ecc71; }
.stats-bar .fail { color: #e74c3c; }
.custom-panel { background: #1a2a3a; border: 1px solid #2a3a4a; border-radius: 8px; padding: 12px; margin-top: 12px; }
.custom-panel h3 { font-size: 12px; color: #7a8a9a; margin-bottom: 8px; }
.custom-panel textarea { width: 100%; background: #0f1923; border: 1px solid #3a4a5a; color: #e0e6ed; padding: 8px; border-radius: 6px; font-family: monospace; font-size: 12px; resize: vertical; min-height: 60px; }
.custom-panel button { margin-top: 8px; padding: 6px 16px; background: #8e44ad; color: #fff; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
.custom-panel button:hover { background: #7d3c98; }
</style>
</head>
<body>
<div class="header">
  <h1>组合电机控制 · 场景测试面板</h1>
  <div class="conn-bar">
    <span class="status-dot off" id="statusDot"></span>
    <input id="wsUrl" value="ws://localhost:8766" placeholder="WebSocket地址">
    <button class="btn-connect" id="btnConnect" onclick="toggleConnection()">连接</button>
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <div id="scenarioList"></div>
    <div class="custom-panel">
      <h3>自定义命令</h3>
      <textarea id="customCmd" placeholder='{"type": "get_move_mode", "params": {}}'></textarea>
      <button onclick="sendCustom()">发送</button>
    </div>
    <div class="actions">
      <button class="btn-run-all" id="btnRunAll" onclick="runAll()" disabled>全部运行</button>
      <button class="btn-clear" onclick="clearLog()">清空日志</button>
    </div>
  </div>
  <div class="log-panel">
    <div class="log-header">
      <span>通信日志</span>
      <div class="stats-bar">
        <span>通过: <b class="pass" id="statPass">0</b></span>
        <span>失败: <b class="fail" id="statFail">0</b></span>
        <span>总计: <b id="statTotal">0</b></span>
      </div>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>
</div>
<script>
const SCENARIOS = [
  { id:1, category:"交互中 / 用户对话", name:"用户移动位置时的视线跟踪", desc:"头部: 俯仰0→45°, 水平0→45°, 同时运动\n底盘: 保持静止", command:{type:"user_position_tracking",params:{yaw_angle:255,pitch_angle:255}} },
  { id:2, category:"行走/巡逻", name:"巡逻中停至桌子识别记忆物品", desc:"头部: 俯视→左扫→右扫→回正\n底盘: 识别期间保持静止\n多步骤执行", command:{type:"patrol_table_inspection",params:{}} },
  { id:3, category:"唤醒 / 静止状态", name:"声源在头部转角范围内", desc:"头部: 快速转向声源\n底盘: 保持静止", command:{type:"wake_head_range",params:{yaw_angle:255,pitch_angle:255}} },
  { id:4, category:"唤醒 / 静止状态", name:"声源超出头部转角极限", desc:"头部: 先转至极限, 底盘转向后回正\n底盘: 辅助原地旋转正对用户\n多步骤执行", command:{type:"wake_beyond_head_range",params:{yaw_angle:255,pitch_angle:255}} },
  { id:5, category:"唤醒 / 运动状态", name:"行走中侧方被唤醒", desc:"头部: 先转向声源, 底盘转向后回正\n底盘: 行走中平滑左转45°\n多步骤执行", command:{type:"wake_side_moving",params:{yaw_angle:255}} },
  { id:6, category:"唤醒 / 运动状态", name:"行走中后方被唤醒并停止", desc:"头部: 先转至极限, 底盘转向后回正\n底盘: 减速并原地旋转180°\n多步骤执行", command:{type:"wake_back_moving",params:{yaw_angle:255}} }
];

let ws = null;
let stats = { pass:0, fail:0, total:0 };
let pendingResolve = null;

function ts() { return new Date().toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit',fractionalSecondDigits:3}); }

function addLog(msg, cls='info') {
  const el = document.getElementById('logBody');
  const d = document.createElement('div');
  d.className = 'log-entry ' + cls;
  d.innerHTML = '<span class="ts">['+ts()+']</span>' + escHtml(msg);
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function updateStats() {
  document.getElementById('statPass').textContent = stats.pass;
  document.getElementById('statFail').textContent = stats.fail;
  document.getElementById('statTotal').textContent = stats.total;
}

function toggleConnection() {
  if (ws && ws.readyState === WebSocket.OPEN) { ws.close(); return; }
  const url = document.getElementById('wsUrl').value.trim();
  addLog('连接到 ' + url + ' ...', 'info');
  try { ws = new WebSocket(url); } catch(e) { addLog('连接失败: '+e, 'error'); return; }
  ws.onopen = () => {
    addLog('已连接到WebSocket服务器', 'recv');
    document.getElementById('statusDot').className = 'status-dot on';
    document.getElementById('btnConnect').textContent = '断开';
    document.getElementById('btnConnect').className = 'btn-disconnect';
    document.getElementById('btnRunAll').disabled = false;
  };
  ws.onclose = () => {
    addLog('WebSocket连接已断开', 'error');
    document.getElementById('statusDot').className = 'status-dot off';
    document.getElementById('btnConnect').textContent = '连接';
    document.getElementById('btnConnect').className = 'btn-connect';
    document.getElementById('btnRunAll').disabled = true;
    ws = null;
    if (pendingResolve) { pendingResolve(null); pendingResolve = null; }
  };
  ws.onerror = (e) => { addLog('WebSocket错误', 'error'); };
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      addLog('响应: ' + JSON.stringify(data, null, 2), 'recv');
      if (pendingResolve) { pendingResolve(data); pendingResolve = null; }
    } catch(err) { addLog('解析响应失败: ' + e.data, 'error'); }
  };
}

function sendAndRecv(cmd, timeout=60000) {
  return new Promise((resolve) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) { resolve(null); return; }
    const msg = JSON.stringify(cmd);
    addLog('发送: ' + msg, 'send');
    pendingResolve = resolve;
    ws.send(msg);
    setTimeout(() => { if (pendingResolve === resolve) { addLog('等待响应超时', 'error'); pendingResolve = null; resolve(null); } }, timeout);
  });
}

async function runScenario(s) {
  const card = document.getElementById('card-'+s.id);
  card.className = 'scenario-card running';
  const badge = document.getElementById('badge-'+s.id);
  badge.textContent = '运行中'; badge.className = 'badge badge-running';
  addLog('━━━ 场景'+s.id+': '+s.name+' ━━━', 'info');
  const resp = await sendAndRecv(s.command);
  stats.total++;
  if (resp && resp.success) {
    stats.pass++;
    card.className = 'scenario-card pass';
    badge.textContent = '通过'; badge.className = 'badge badge-pass';
    addLog('场景'+s.id+' 测试通过', 'recv');
  } else {
    stats.fail++;
    card.className = 'scenario-card fail';
    badge.textContent = '失败'; badge.className = 'badge badge-fail';
    addLog('场景'+s.id+' 测试失败: '+(resp?resp.error_msg||'未知错误':'无响应'), 'error');
  }
  updateStats();
  return resp && resp.success;
}

async function runSingle(id) {
  if (!ws || ws.readyState !== WebSocket.OPEN) { addLog('请先连接WebSocket', 'error'); return; }
  const s = SCENARIOS.find(x=>x.id===id);
  if (s) await runScenario(s);
}

async function runAll() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { addLog('请先连接WebSocket', 'error'); return; }
  document.getElementById('btnRunAll').disabled = true;
  stats = {pass:0,fail:0,total:0}; updateStats();
  SCENARIOS.forEach(s => { document.getElementById('card-'+s.id).className='scenario-card'; document.getElementById('badge-'+s.id).textContent=''; });
  addLog('━━━━━━ 开始全部场景测试 ━━━━━━', 'info');
  for (const s of SCENARIOS) {
    await runScenario(s);
    await new Promise(r=>setTimeout(r,1500));
  }
  addLog('━━━━━━ 测试完成: 通过 '+stats.pass+' / 失败 '+stats.fail+' / 共 '+stats.total+' ━━━━━━', 'info');
  document.getElementById('btnRunAll').disabled = false;
}

function sendCustom() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { addLog('请先连接WebSocket', 'error'); return; }
  const txt = document.getElementById('customCmd').value.trim();
  try { const cmd = JSON.parse(txt); sendAndRecv(cmd); } catch(e) { addLog('JSON格式错误: '+e.message, 'error'); }
}

function clearLog() { document.getElementById('logBody').innerHTML = ''; }

// 渲染场景列表
(function renderScenarios() {
  const el = document.getElementById('scenarioList');
  let html = '', lastCat = '';
  SCENARIOS.forEach(s => {
    if (s.category !== lastCat) { lastCat = s.category; html += '<div class="category-label">'+escHtml(s.category)+'</div>'; }
    html += '<div class="scenario-card" id="card-'+s.id+'" onclick="runSingle('+s.id+')">'
      + '<div class="title"><span>'+s.id+'. '+escHtml(s.name)+'</span><span class="badge" id="badge-'+s.id+'"></span></div>'
      + '<div class="desc">'+escHtml(s.desc)+'</div></div>';
  });
  el.innerHTML = html;
})();
</script>
</body>
</html>
